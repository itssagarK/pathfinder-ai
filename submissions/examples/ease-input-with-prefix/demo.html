<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input fields with prefix highlights - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Input with Animated Prefix</h1>
      <p>Clean, responsive input containers that morph border colors and highlight prefix decor on cursor focus.</p>
    </header>

    <div class="forms-card">
      <form onsubmit="event.preventDefault()">
        
        <!-- Input 1: Username Input -->
        <div class="form-group">
          <label for="username">Username Handle</label>
          <div class="ease-input-container group-purple">
            <span class="ease-input-prefix">@</span>
            <input type="text" id="username" placeholder="saptarshi_coder" required>
          </div>
        </div>

        <!-- Input 2: Currency/Salary Input -->
        <div class="form-group">
          <label for="salary">Bounty budget</label>
          <div class="ease-input-container group-blue" style="--ease-prefix-color: #3b82f6;">
            <span class="ease-input-prefix">$</span>
            <input type="number" id="salary" placeholder="5,000" min="0" required>
          </div>
        </div>

        <!-- Input 3: Website/Domain Input -->
        <div class="form-group">
          <label for="domain">Project URL</label>
          <div class="ease-input-container group-emerald" style="--ease-prefix-color: #10b981;">
            <span class="ease-input-prefix">https://</span>
            <input type="text" id="domain" placeholder="github.com/itssagark" required>
          </div>
        </div>

        <!-- Input 4: Phone Number with Flag/Country code -->
        <div class="form-group">
          <label for="phone">Contact Number</label>
          <div class="ease-input-container group-orange" style="--ease-prefix-color: #f97316;">
            <span class="ease-input-prefix">🇮🇳 +91</span>
            <input type="tel" id="phone" placeholder="98765 43210" required>
          </div>
        </div>

        <button class="submit-btn" type="submit">Submit Parameters</button>
      </form>
    </div>
  </div>
</body>
</html>
