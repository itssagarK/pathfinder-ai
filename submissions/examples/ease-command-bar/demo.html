<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Bar Modal - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Command Bar Trigger</h1>
      <p>A keyboard-accessible, smooth-scaling command panel interface designed for rapid command searches.</p>
      <button class="trigger-btn" onclick="openCommandBar()">
        <span class="btn-text">Open Command Bar</span>
        <span class="shortcut">Ctrl+K</span>
      </button>
    </header>
  </div>

  <!-- Backdrop Modal Overlay -->
  <div id="cmd-overlay" class="cmd-overlay" onclick="closeOnBackdrop(event)">
    
    <!-- Input Panel (Scales in from center) -->
    <div class="cmd-panel" id="cmd-panel">
      <div class="cmd-header">
        <span class="search-icon">🔍</span>
        <input type="text" id="cmd-input" placeholder="Type a command or search..." autocomplete="off" oninput="handleSearch(this.value)">
        <span class="esc-badge" onclick="closeCommandBar()">ESC</span>
      </div>

      <!-- Results Container -->
      <div class="cmd-results" id="cmd-results">
        <!-- Results are dynamically populated to showcase staggered entering, navigation and highlighting -->
      </div>

      <div class="cmd-footer">
        <span>Use <kbd>↑</kbd> <kbd>↓</kbd> to navigate</span>
        <span><kbd>Enter</kbd> to select</span>
        <span><kbd>ESC</kbd> to close</span>
      </div>
    </div>

  </div>

  <script>
    const overlay = document.getElementById('cmd-overlay');
    const panel = document.getElementById('cmd-panel');
    const input = document.getElementById('cmd-input');
    const resultsContainer = document.getElementById('cmd-results');
    
    const commandsList = [
      { id: 'home', title: 'Go to Dashboard', desc: 'Navigate to your primary workspace statistics', category: 'Navigation', icon: '🏠' },
      { id: 'projects', title: 'Search Projects', desc: 'Browse through active code repositories and files', category: 'Navigation', icon: '📁' },
      { id: 'theme', title: 'Toggle Dark Mode', desc: 'Switch interface styling appearance theme', category: 'Preferences', icon: '🌓' },
      { id: 'profile', title: 'Edit Account Profile', desc: 'Modify personal settings and avatar badges', category: 'Settings', icon: '👤' },
      { id: 'keys', title: 'Manage API Keys', desc: 'Access security tokens for service integrations', category: 'Settings', icon: '🔑' },
      { id: 'docs', title: 'View Documentation', desc: 'Read guides and components reference files', category: 'Resources', icon: '📚' },
      { id: 'support', title: 'Contact Support Help', desc: 'Open a chat assistance ticket with dev staff', category: 'Resources', icon: '💬' }
    ];

    let filteredCommands = [...commandsList];
    let selectedIndex = 0;
    let isOpen = false;

    // Toggle opening
    function openCommandBar() {
      overlay.classList.add('active');
      panel.classList.add('active');
      input.value = '';
      input.focus();
      filteredCommands = [...commandsList];
      selectedIndex = 0;
      renderResults();
      isOpen = true;
    }

    function closeCommandBar() {
      overlay.classList.remove('active');
      panel.classList.remove('active');
      isOpen = false;
    }

    function closeOnBackdrop(e) {
      if (e.target === overlay) {
        closeCommandBar();
      }
    }

    // Handle search input
    function handleSearch(val) {
      const searchVal = val.toLowerCase().trim();
      if (!searchVal) {
        filteredCommands = [...commandsList];
      } else {
        filteredCommands = commandsList.filter(cmd => 
          cmd.title.toLowerCase().includes(searchVal) || 
          cmd.desc.toLowerCase().includes(searchVal) ||
          cmd.category.toLowerCase().includes(searchVal)
        );
      }
      selectedIndex = 0;
      renderResults();
    }

    // Render results into HTML with staggered transitions
    function renderResults() {
      resultsContainer.innerHTML = '';
      
      if (filteredCommands.length === 0) {
        resultsContainer.innerHTML = `<div class="no-results-state">No commands found for "${input.value}"</div>`;
        return;
      }

      let currentCategory = '';
      let relativeItemIndex = 0;

      filteredCommands.forEach((cmd, idx) => {
        // Section Categories
        if (cmd.category !== currentCategory) {
          currentCategory = cmd.category;
          const sectionHeader = document.createElement('div');
          sectionHeader.className = 'result-category';
          sectionHeader.textContent = currentCategory;
          resultsContainer.appendChild(sectionHeader);
        }

        const item = document.createElement('div');
        // Stagger list elements stagger-1, stagger-2 etc.
        const staggerClass = `stagger-${Math.min(relativeItemIndex + 1, 6)}`;
        item.className = `result-item ${staggerClass} ${idx === selectedIndex ? 'active' : ''}`;
        item.onclick = () => selectItem(idx);
        item.innerHTML = `
          <span class="item-icon">${cmd.icon}</span>
          <div class="item-details">
            <span class="item-title">${cmd.title}</span>
            <span class="item-desc">${cmd.desc}</span>
          </div>
          ${idx === selectedIndex ? '<span class="item-shortcut">Enter ↵</span>' : ''}
        `;
        
        resultsContainer.appendChild(item);
        relativeItemIndex++;
      });

      // Scroll active item into view
      const activeElement = resultsContainer.querySelector('.result-item.active');
      if (activeElement) {
        activeElement.scrollIntoView({ block: 'nearest' });
      }
    }

    function selectItem(idx) {
      const selected = filteredCommands[idx];
      alert(`Executing: "${selected.title}"`);
      closeCommandBar();
    }

    // Key Listeners
    window.addEventListener('keydown', (e) => {
      // Toggle Ctrl+K or Cmd+K
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        if (isOpen) closeCommandBar();
        else openCommandBar();
      }

      if (!isOpen) return;

      switch(e.key) {
        case 'Escape':
          e.preventDefault();
          closeCommandBar();
          break;
        case 'ArrowDown':
          e.preventDefault();
          selectedIndex = (selectedIndex + 1) % filteredCommands.length;
          renderResults();
          break;
        case 'ArrowUp':
          e.preventDefault();
          selectedIndex = (selectedIndex - 1 + filteredCommands.length) % filteredCommands.length;
          renderResults();
          break;
        case 'Enter':
          e.preventDefault();
          if (filteredCommands[selectedIndex]) {
            selectItem(selectedIndex);
          }
          break;
      }
    });
  </script>
</body>
</html>
