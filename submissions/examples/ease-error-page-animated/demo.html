<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Lost in Space - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Starry Background Animation -->
  <div class="stars-container">
    <div class="star star-1"></div>
    <div class="star star-2"></div>
    <div class="star star-3"></div>
    <div class="star star-4"></div>
    <div class="star star-5"></div>
  </div>

  <div class="error-container">
    <div class="illustration-wrapper">
      <!-- Animated Astronaut Illustration -->
      <svg class="astronaut-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="astroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a5b4fc" />
            <stop offset="100%" stop-color="#6366f1" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <!-- Tether Line -->
        <path d="M40,160 Q80,180 100,120" fill="none" stroke="rgba(99, 102, 241, 0.4)" stroke-width="2" stroke-dasharray="4,4" />
        
        <!-- Floating body -->
        <g class="float-group">
          <!-- Jetpack -->
          <rect x="75" y="70" width="50" height="60" rx="10" fill="#2e3a59" />
          <rect x="85" y="65" width="30" height="10" rx="3" fill="#4f5e84" />
          
          <!-- Suit Body -->
          <circle cx="100" cy="100" r="30" fill="#e0e7ff" />
          
          <!-- Limbs -->
          <rect x="65" y="95" width="15" height="40" rx="7" fill="#c7d2fe" transform="rotate(20 65 95)" />
          <rect x="120" y="95" width="15" height="40" rx="7" fill="#c7d2fe" transform="rotate(-20 120 95)" />
          <rect x="80" y="125" width="16" height="45" rx="8" fill="#a5b4fc" />
          <rect x="104" y="125" width="16" height="45" rx="8" fill="#a5b4fc" />
          
          <!-- Helmet -->
          <circle cx="100" cy="70" r="22" fill="#f8fafc" />
          <path d="M85,68 Q100,50 115,68 Q118,82 100,82 Q82,82 85,68 Z" fill="url(#astroGrad)" filter="url(#glow)" />
          
          <!-- Reflections -->
          <ellipse cx="94" cy="62" rx="4" ry="2" fill="#ffffff" opacity="0.8" transform="rotate(-15 94 62)" />
        </g>
      </svg>
    </div>

    <!-- Glowing Error Code -->
    <h1 class="ease-text-glow">404</h1>

    <h2 class="error-title">Lost in the Cosmos</h2>
    <p class="error-desc">
      The coordinates you entered led to uncharted coordinates. The page you are looking for has drifted into a black hole.
    </p>

    <!-- Back Home CTA -->
    <a href="#" class="ease-btn">
      <span class="btn-text">Navigate Home</span>
      <span class="btn-glow"></span>
    </a>
  </div>
</body>
</html>
